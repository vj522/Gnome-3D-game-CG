<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnome 3D Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            pointer-events: none;
        }
        
        #correct-names {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            pointer-events: none;
            max-width: 300px;
        }
        
        #correct-names h3 {
            margin-bottom: 8px;
            color: #4ade80;
        }
        
        #correct-names-list {
            list-style: none;
        }
        
        #correct-names-list li {
            padding: 4px 0;
            color: #a0f0a0;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>
    
    <div id="info">
        <div>WASD - Move</div>
        <div>Space - Jump</div>
        <div>8 - Toggle Blur</div>
        <div>Mouse - Look around</div>
        <div>Click to lock pointer</div>
    </div>
    
    <div id="loading">Loading...</div>
    
    <div id="correct-names">
        <h3>Correct Objects:</h3>
        <ul id="correct-names-list"></ul>
    </div>
    
    <script type="module" src="main.js"></script>
</body>
</html>
